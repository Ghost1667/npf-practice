<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Common Entrance Practice - Security Education</title>
    <style>
        :root {
            --primary: #1a2a3a;
            --accent: #d4af37;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #fdfdfd;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { background: #fff; width: 100%; max-width: 650px; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #eee; }
        h1 { color: var(--primary); font-size: 1.4rem; text-align: center; margin-bottom: 30px; text-transform: uppercase; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .question { display: none; }
        .question.active { display: block; }
        .question-text { font-weight: 600; margin-bottom: 20px; font-size: 1.15rem; color: var(--primary); }
        .options { list-style: none; padding: 0; }
        .options li { margin-bottom: 12px; }
        
        label { display: block; padding: 15px; border: 1px solid #eaeaea; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        label.correct { background: #d4edda !important; border-color: var(--success) !important; color: #155724; font-weight: bold; }
        label.wrong { background: #f8d7da !important; border-color: var(--error) !important; color: #721c24; }
        label.disabled { cursor: not-allowed; opacity: 0.7; }
        
        input[type="radio"] { display: none; } 

        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; }
        button { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: var(--primary); color: white; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #progress { font-size: 0.9rem; color: #666; }
        #result-box { text-align: center; }
    </style>
</head>
<body>

<div class="container" id="quiz-box">
    <h1>Common Entrance Practice</h1>
    <div id="question-container"></div>
    
    <div class="controls">
        <div id="progress">Question 1 of 50</div>
        <button id="next-btn" onclick="nextQuestion()" disabled>Next Question</button>
    </div>
</div>

<div class="container" id="result-box" style="display:none;">
    <h1>Practice Complete</h1>
    <div style="font-size: 3rem; margin: 20px 0;" id="score-num">0</div>
    <p id="remark"></p>
    <button onclick="location.reload()" style="width:100%;">Restart Session</button>
</div>

<script>
    const questions = [
        { q: "Security Education is important to the society because _______", a: "it promotes peace and tranquility", options: ["it promotes national disorderliness", "it gives insecurity", "it reduces our value", "it promotes peace and tranquility", "All of the above"] },
        { q: "The unlawful or declaration that is contrary to the truth is called _______", a: "Falsehood", options: ["Dishonesty", "Forgery", "Falsehood", "Impersonation", "None of the above"] },
        { q: "The following are examples of common crime except _______", a: "Standing", options: ["Rape", "Standing", "Examination malpractice", "Thuggery", "All of the above"] },
        { q: "The act that violates a law which results in parliament is known as _______", a: "Crime", options: ["Victim", "Commission", "Crime", "Falsehood", "Murder"] },
        { q: "The act of having sexual intercourse with a person without his/her permission is known as _______", a: "Cape", options: ["Cultism", "Murder", "Rape", "Theft", "All of the above"] },
        { q: "The unlawful killing of another person without justification is called _______", a: "Murder", options: ["Dishonesty", "Rape", "Murder", "Smuggling", "Theft"] },
        { q: "A deliberate deception to secure unfair and unlawful gain is called _______", a: "Fraud", options: ["Theft", "Murder", "Piracy", "Fraud", "None of the above"] },
        { q: "One of the causes of rape is _______", a: "Indecent Dressing", options: ["Social Stigma", "Unwanted Pregnancy", "Decent Dressing", "Indecent Dressing", "None of the above"] },
        { q: "Goods that are not allowed by the law to be imported into a country are known as _______", a: "Contraband", options: ["Illegal", "Contraband", "Foreign", "Secret Cult", "All of the above"] },
        { q: "The following are causes of murder except _______", a: "Peace", options: ["Jealousy", "Peace", "Greed", "Hatred", "Revenge"] },
        { q: "_______ is the relationship on blood covenant", a: "Cult", options: ["Personal", "Fraud", "Rape", "Cult", "All of the above"] },
        { q: "The non-medical use of drugs is known as _______", a: "Drug Abuse", options: ["Child Abuse", "Peer Pressure", "Self Esteem", "Drug Abuse", "All of the above"] },
        { q: "The act of protecting anything valuable such as lives and properties is called _______", a: "Security", options: ["Education", "Security", "Awareness", "Protection", "None of the above"] },
        { q: "The awareness, knowledge or enlightenment given to citizens for the protection of lives and properties is called _______", a: "Security Education", options: ["Education", "Security", "Awareness", "Protection", "Security Education"] },
        { q: "Any act that is harmful to an individual or community is _______", a: "Crime", options: ["Punishment", "Omission", "Addition", "Crime", "Security"] },
        { q: "All these are types of crime except _______", a: "Criminology", options: ["Property Crime", "Personal Crime", "Organized Crime", "Victimless Crime", "Criminology"] },
        { q: "Theft can be otherwise called _______", a: "Stealing", options: ["Stealing", "Falsehood", "Rape", "Piracy", "None of the above"] },
        { q: "_______ is an act of lying", a: "Falsehood", options: ["Cultism", "Embezzlement", "Piracy", "Theft", "Falsehood"] },
        { q: "An act of pretending to be another person in order to defraud is called _______", a: "Impersonation", options: ["Forgery", "Dishonesty", "Impersonation", "Sophistication", "None of the above"] },
        { q: "The type of crime that is committed when someone damages, destroys or steals someone's property is _______", a: "Property Crime", options: ["Property Crime", "Personal Crime", "Victimless Crime", "Organized Crime", "None of the above"] },
        { q: "Any crime that results in physical, emotional or psychological harm to the victim is known as _______ crime", a: "Personal", options: ["Property", "Organized", "Personal", "Emotional", "Victim"] },
        { q: "All these are causes of common crimes except _______", a: "Mismanagement", options: ["Poverty", "Over Population", "Family Condition", "Peer group influence", "Mismanagement"] },
        { q: "The act of taking another person's property without permission with intent to deprive the rightful owner is _______", a: "Theft", options: ["Piracy", "Advanced Free Fraud", "Falsehood", "Theft", "Murder"] },
        { q: "The bringing in of contraband goods into a country is called _______", a: "Smuggling", options: ["Smuggling", "Importation", "Theft", "Piracy", "None of the above"] },
        { q: "The illegal or unauthorized duplication of copyrighted content is known as _______", a: "Piracy", options: ["Falsehood", "Piracy", "Smuggling", "Theft"] },
        { q: "All these are examples of falsehood except _______", a: "Honesty", options: ["Dishonesty", "Forgery", "Impersonation", "Sophistication", "Honesty"] },
        { q: "All these are reasons for falsehood except _______", a: "None of the above", options: ["Cover up", "Pride and Envy", "Misguided Kindness", "Habit", "None of the above"] },
        { q: "Which of these is not a consequence of falsehood?", a: "It promotes better relationship", options: ["It harm others", "it influences other to commit crime", "It promotes better relationship", "It leads to loss of respect", "It leads to imprisonment"] },
        { q: "The crime of taking or attempting to take anything valuable by force or threat of force is _______", a: "Robbery", options: ["Embezzlement", "Robbery", "Fraud", "Burglary", "Corruption"] },
        { q: "The urge to steal for no reason is known as _______", a: "Kleptomania", options: ["Pilfering", "Kleptomania", "Deprivation", "Poverty", "Theft"] },
        { q: "Serial killers can otherwise be called _______", a: "Mass murderers", options: ["Murderers", "Cultist", "Mass murderers", "Smugglers", "Killers"] },
        { q: "The killing of strangers is known as _______", a: "Homicide", options: ["Murder", "Killing", "Serial killing", "Domicile", "Homicide"] },
        { q: "_______ is the type of fraud whenever someone signs another person's name on a document for personal gain", a: "Forgery Fraud", options: ["Tax Fraud", "Welfare Fraud", "Forgery Fraud", "Identity Fraud", "Fraud in the inducement"] },
        { q: "The kind of penalty that allows a criminal to serve his/her sentence without going to jail is called _______", a: "Probation", options: ["Restitution", "Incarceration", "Fines", "Probation", "None of the above"] },
        { q: "When a person illegally obtained personal information regarding another person to assume his/her identity is called _______", a: "Identity Theft", options: ["Identity Theft", "Tax Fraud", "Welfare Fraud", "Forgery Fraud", "Fraud in the inducement"] },
        { q: "All these are causes of embezzlement except _______", a: "Lack of supervision", options: ["Lack of Commitment", "Extravagant living standard", "Lack of proper accounting", "Inadequate income", "Lack of supervision"] },
        { q: "_______ is the process of imparting and acquiring general knowledge", a: "education", options: ["education", "Security Education", "Social Studies", "Civic Education", "Government"] },
        { q: "The offence of a crime is called _______", a: "Criminal Offence", options: ["Criminal Offence", "Security Offence", "Social Offence", "Theft Offence", "All of the above"] },
        { q: "The following are security agents in Nigeria except _______", a: "Man of War", options: ["Nigerian Police", "Civil Defence", "Nigerian Army", "Nigerian Navy", "Man of War"] },
        { q: "The attempt to reduce and deter crime and criminal is called _______", a: "Crime Prevention", options: ["Crime Reduction", "Crime Prevention", "Crime deterrent", "Crime Discouragement", "None of the above"] },
        { q: "The acronym NPF means _______ as Security Agency", a: "Nigeria Police Force", options: ["Nigerian Park Foundation", "National Pro Fastpitch", "National Psoriasis Foundation", "Norton Personal Firewall", "Nigeria Police Force"] },
        { q: "The acronym NAF as one of the Security Agencies in Nigeria means _______", a: "Nigerian Air Force", options: ["Nigerian Air Force", "Nigeria Air Fence", "National Air Force", "National Air Fence", "Nation Arm Force"] },
        { q: "The acronym NA is used to represent _______ security agent", a: "Nigerian Army", options: ["Nigerian Army", "National Army", "Nigerian Armed", "National Armed"] },
        { q: "NN means _______ as a security body in Nigeria", a: "Nigerian Navy", options: ["Nigerian Navy", "National Navy", "Nomen Nescio", "Norman Null"] },
        { q: "The body that comprises the three arm Forces in Nigeria is called _______", a: "National Armed Forces", options: ["Nigerian Air Force", "Nigerian Armed Forces", "National Armed Forces", "National Air Force", "Nation Arm Fence"] },
        { q: "The acronym FRSC means _______ as a law enforcement agent", a: "Federal Road Safety Corps", options: ["Federal Road Safety Company", "Federal Road Safety Corps", "Federal Road Service Company", "Federal Road Safety Company"] },
        { q: "What is an emergency?", a: "An unplanned serious and dangerous event", options: ["A planned, funny and safe event", "A good story", "A creation of plans", "An unplanned serious and dangerous event", "A delightful event"] },
        { q: "What is the meaning of NEMA?", a: "National Emergency Management Agency", options: ["National Environment Management Agency", "National Emergency Management Agency", "National Environment Management Authority", "National Environment Management Authority", "Nigeria Emergency Management Authority"] },
        { q: "One of the following is not a home accident", a: "Falling off a tree", options: ["Cuts from knife", "Electric Shock", "Falls from stairways", "Falling off a tree", "Burns and Scalds"] },
        { q: "The dishonest or fraudulent conduct by those in power typically involving bribery is called _______", a: "Corruption", options: ["Theft", "Fraud", "Bribery", "Embezzlement", "Corruption"] }
    ];

    let currentIdx = 0;
    let score = 0;

    function initQuiz() {
        const container = document.getElementById('question-container');
        questions.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = `question ${index === 0 ? 'active' : ''}`;
            div.id = `q-${index}`;
            
            let optionsHtml = '';
            item.options.forEach((opt, optIdx) => {
                optionsHtml += `
                    <li>
                        <label id="label-${index}-${optIdx}">
                            <input type="radio" name="answer-${index}" value="${opt}" onclick="checkAnswer(${index}, ${optIdx}, '${opt}')"> 
                            ${opt}
                        </label>
                    </li>`;
            });

            div.innerHTML = `<div class="question-text">${index + 1}. ${item.q}</div><ul class="options">${optionsHtml}</ul>`;
            container.appendChild(div);
        });
    }

    function checkAnswer(qIdx, optIdx, selectedVal) {
        const correctVal = questions[qIdx].a;
        const labels = document.querySelectorAll(`#q-${qIdx} label`);
        const nextBtn = document.getElementById('next-btn');

        labels.forEach(label => {
            label.classList.add('disabled');
            label.querySelector('input').disabled = true;
        });

        if (selectedVal === correctVal) {
            document.getElementById(`label-${qIdx}-${optIdx}`).classList.add('correct');
            score++;
        } else {
            document.getElementById(`label-${qIdx}-${optIdx}`).classList.add('wrong');
            labels.forEach((label, i) => {
                if (questions[qIdx].options[i] === correctVal) {
                    label.classList.add('correct');
                }
            });
        }
        
        nextBtn.disabled = false;
        if (currentIdx === questions.length - 1) nextBtn.innerText = "Complete Session";
    }

    function nextQuestion() {
        document.getElementById(`q-${currentIdx}`).classList.remove('active');
        currentIdx++;

        if (currentIdx < questions.length) {
            document.getElementById(`q-${currentIdx}`).classList.add('active');
            document.getElementById('progress').innerText = `Question ${currentIdx + 1} of ${questions.length}`;
            document.getElementById('next-btn').disabled = true;
        } else {
            showFinalResult();
        }
    }

    function showFinalResult() {
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('score-num').innerText = score + " / " + questions.length;
        
        const remark = score > 40 ? "Excellent Performance!" : (score > 25 ? "Good Job. Review the missed questions." : "Keep practicing. You'll get better!");
        document.getElementById('remark').innerText = remark;
    }

    initQuiz();
</script>

</body>
</html>
